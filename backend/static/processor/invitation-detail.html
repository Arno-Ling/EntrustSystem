<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>询价邀请 - MVP</title>
<link rel="stylesheet" href="/static/common.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <a href="/static/processor/home.html" style="color:inherit;">🏭 加工方首页</a>
    &nbsp;›&nbsp; <span style="color:#e2e8f0;">询价邀请详情</span>
  </div>
  <div class="user">
    <span class="badge processor">processor</span>
    <span id="user-name">—</span>
    <button class="logout" onclick="App.logout()">退出</button>
  </div>
</header>

<main>
  <div class="card">
    <h2>📨 询价信息</h2>
    <div id="basic" style="margin-top:14px;">加载中...</div>
  </div>

  <div class="card">
    <h2>🔧 零件清单</h2>
    <table style="margin-top:14px;">
      <thead>
        <tr><th>零件号</th><th>名称</th><th>材质</th><th>数量</th><th>工序</th><th>规格</th></tr>
      </thead>
      <tbody id="partsBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>📐 图纸</h2>
    <ul id="attList" style="margin-top:10px; list-style:none;"></ul>
  </div>

  <div class="card" id="quoteCard">
    <h2 id="quoteTitle">✍️ 提交报价</h2>

    <!-- 矩阵报价（有 scope_items 时） -->
    <div id="lineMode" style="display:none; margin-top:14px;">
      <p class="muted">本询价单已细分为 <b id="lineCount">0</b> 个委外项，请按每一项填单价和交期。</p>
      <table style="margin-top:8px;">
        <thead><tr>
          <th style="width:40px;">#</th>
          <th>粒度</th>
          <th>路径</th>
          <th>数量</th>
          <th style="width:120px;">单价（元）</th>
          <th style="width:80px;">交期（天）</th>
          <th>备注</th>
        </tr></thead>
        <tbody id="lineBody"></tbody>
      </table>
      <div style="margin-top:14px;">
        <label>整体备注</label>
        <textarea id="note_lines" rows="2"></textarea>
      </div>
      <div style="margin-top:12px; display:flex; justify-content:flex-end;">
        <button class="primary" id="btnSubmitLines" onclick="submitLines()">提交逐项报价</button>
      </div>
    </div>

    <!-- 整单报价（legacy） -->
    <div id="legacyMode" style="margin-top:14px;">
      <div class="flex">
        <div class="flex-grow">
          <label>单价（元/件）*</label>
          <input id="unit_price" type="number" step="0.01" min="0.01" required>
        </div>
        <div class="flex-grow">
          <label>交期（天）*</label>
          <input id="lead_time_days" type="number" min="1" required>
        </div>
      </div>
      <label>备注 / 说明</label>
      <textarea id="note" rows="3" placeholder="可选：特殊工艺说明 / 物流说明 / 其他"></textarea>
      <div style="margin-top:16px; display:flex; justify-content:flex-end;">
        <button class="primary" id="btnSubmit" onclick="submitQuote()">提交报价</button>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
<script>
(function () {
  const user = App.requireTenantType('processor');
  document.getElementById('user-name').textContent = user.display_name || user.username;

  const id = new URLSearchParams(location.search).get('id');
  if (!id) { alert('缺少 id'); location.href = '/static/processor/home.html'; return; }

  function toast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2500);
  }

  async function load() {
    try {
      const data = await App.api('/api/processor/invitations/' + id);
      const inv = data.invitation;

      // Basic
      document.getElementById('basic').innerHTML = `
        <div><b>项目</b>: <code>${App.esc(inv.project_no)}</code> ${App.esc(inv.project_name || '')}</div>
        <div><b>标题</b>: ${App.esc(inv.request_title)}</div>
        <div><b>客户</b>: ${App.esc(inv.customer || '—')} &nbsp;|&nbsp; <b>数量</b>: ${inv.quantity || '—'} &nbsp;|&nbsp; <b>截止</b>: ${App.esc(inv.deadline || '—')}</div>
        <div style="margin-top:6px;"><b>所需工艺</b>:
          ${(inv.required_processes || []).map(p => '<span class="badge drafted" style="margin-right:4px;">'+App.esc(p)+'</span>').join('')}
        </div>
        ${inv.material_sourcing === 'internal' ?
          '<div style="margin-top:10px; padding:10px; background:#064e3b; border:1px solid #10b981; border-radius:6px; color:#6ee7b7;">📦 材料由我方统一供应，无需报材料费</div>' :
          inv.material_sourcing === 'processor' ?
          '<div style="margin-top:10px; padding:10px; background:#78350f; border:1px solid #f59e0b; border-radius:6px; color:#fbbf24;">🛒 材料由贵方自行采购，请在报价中包含材料成本</div>' : ''}
        <div class="muted" style="margin-top:8px;">邀请状态: <span class="badge ${inv.invitation_status}">${App.esc(inv.invitation_status)}</span></div>
      `;

      // Parts
      const partsBody = document.getElementById('partsBody');
      if (!data.parts.length) {
        partsBody.innerHTML = `<tr><td colspan="6" class="empty">无零件</td></tr>`;
      } else {
        partsBody.innerHTML = data.parts.map(p => `
          <tr>
            <td><code>${App.esc(p.part_no)}</code></td>
            <td>${App.esc(p.part_name || '—')}</td>
            <td>${App.esc(p.material || '—')}</td>
            <td>${p.qty}</td>
            <td>${(p.processes || []).map(x => '<span class="badge drafted" style="margin-right:4px;">'+App.esc(x)+'</span>').join('')}</td>
            <td>${App.esc(p.spec || '—')}</td>
          </tr>
        `).join('');
      }

      // Attachments
      const attList = document.getElementById('attList');
      if (!data.attachments.length) {
        attList.innerHTML = '<li class="muted">无图纸</li>';
      } else {
        attList.innerHTML = data.attachments.map(a => `
          <li style="padding:6px 0;">
            📄 ${App.esc(a.file_name)} &nbsp;
            <span class="muted">(${a.file_size ? (a.file_size/1024).toFixed(1) + ' KB' : '—'})</span>
            &nbsp; <a href="/api/processor/attachments/${a.id}/download" target="_blank">下载</a>
          </li>
        `).join('');
      }

      // Quote form
      const qc = document.getElementById('quoteCard');
      const btn = document.getElementById('btnSubmit');
      const scope = data.scope_items || [];
      const myLines = data.my_quote_lines || [];
      const materialSourcing = inv.material_sourcing || null;
      window._materialSourcing = materialSourcing;

      if (scope.length > 0) {
        // 矩阵模式
        document.getElementById('lineMode').style.display = 'block';
        document.getElementById('legacyMode').style.display = 'none';
        document.getElementById('lineCount').textContent = scope.length;
        const byItem = {};
        myLines.forEach(l => byItem[l.scope_item_id] = l);

        const showMatCol = materialSourcing === 'processor';

        document.getElementById('lineBody').innerHTML = scope.map((it, idx) => {
          const existing = byItem[it.scope_item_id];
          return `<tr>
            <td>${idx+1}</td>
            <td><span class="badge ${it.scope_level === 'face' ? 'deciding' : 'drafted'}">${App.esc(it.scope_level)}</span></td>
            <td style="font-size:11px;"><code>${App.esc(it.display_path)}</code>
              ${it.description ? '<div class="muted">'+App.esc(it.description)+'</div>' : ''}</td>
            <td>${it.quantity}</td>
            <td><input type="number" step="0.01" min="0.01" data-sid="${it.scope_item_id}" class="line-price"
                       value="${existing ? existing.unit_price : ''}"></td>
            ${showMatCol ? `<td><input type="number" step="0.01" min="0.01" data-sid="${it.scope_item_id}" class="line-mat-price"
                       value="${existing && existing.material_unit_price ? existing.material_unit_price : ''}" placeholder="材料单价"></td>` : ''}
            <td><input type="number" min="1" data-sid="${it.scope_item_id}" class="line-lead"
                       value="${existing ? existing.lead_time_days : ''}"></td>
            <td><input data-sid="${it.scope_item_id}" class="line-note"
                       value="${existing ? App.esc(existing.note || '') : ''}"></td>
          </tr>`;
        }).join('');

        // 动态添加表头列
        if (showMatCol) {
          const thead = document.querySelector('#lineMode thead tr');
          if (thead && !thead.querySelector('.mat-price-th')) {
            const thPrice = thead.querySelectorAll('th')[4]; // 单价列后面
            const newTh = document.createElement('th');
            newTh.className = 'mat-price-th';
            newTh.style.width = '120px';
            newTh.textContent = '材料单价（元）';
            thPrice.after(newTh);
          }
        }

        if (data.my_quote) {
          document.getElementById('quoteTitle').textContent = '✏️ 修改逐项报价';
          document.getElementById('btnSubmitLines').textContent = '更新逐项报价';
          document.getElementById('note_lines').value = data.my_quote.note || '';
        }
        if (inv.request_status !== 'inviting') {
          document.getElementById('quoteTitle').textContent = '⏰ 报价已截止';
          document.querySelectorAll('#lineMode input,#lineMode textarea,#lineMode button').forEach(e => e.disabled = true);
        }
      } else {
        // 整单模式
        if (inv.request_status !== 'inviting') {
          document.getElementById('quoteTitle').textContent = '⏰ 报价已截止';
          btn.disabled = true;
          btn.textContent = '已截止';
        } else if (data.my_quote) {
          document.getElementById('quoteTitle').textContent = '✏️ 修改报价';
          document.getElementById('unit_price').value = data.my_quote.unit_price;
          document.getElementById('lead_time_days').value = data.my_quote.lead_time_days;
          document.getElementById('note').value = data.my_quote.note || '';
          btn.textContent = '更新报价';
        }
      }
    } catch (e) { toast('❌ ' + e.message, 'error'); }
  }

  window.submitLines = async () => {
    const rows = document.querySelectorAll('#lineBody tr');
    const lines = [];
    const isProcessorMode = window._materialSourcing === 'processor';
    for (const r of rows) {
      const priceEl = r.querySelector('.line-price');
      const leadEl  = r.querySelector('.line-lead');
      const noteEl  = r.querySelector('.line-note');
      const matPriceEl = r.querySelector('.line-mat-price');
      const sid = parseInt(priceEl.dataset.sid);
      const price = parseFloat(priceEl.value);
      const lead = parseInt(leadEl.value);
      if (!(price > 0) || !(lead > 0)) {
        toast('❌ 每行都必须填单价和交期', 'error');
        return;
      }
      const lineObj = { scope_item_id: sid, unit_price: price, lead_time_days: lead, note: noteEl.value.trim() || null };
      if (isProcessorMode && matPriceEl) {
        const matPrice = parseFloat(matPriceEl.value);
        if (!(matPrice > 0)) {
          toast('❌ 加工方自采模式下每行都必须填材料单价', 'error');
          return;
        }
        lineObj.material_unit_price = matPrice;
      }
      lines.push(lineObj);
    }
    try {
      const r = await App.api(`/api/processor/invitations/${id}/quote`, {
        method: 'POST',
        body: { lines, note: document.getElementById('note_lines').value.trim() || null },
      });
      toast(`✓ 逐项报价已提交，共 ${r.line_count} 行，汇总 ¥${r.total_price}`);
      setTimeout(load, 500);
    } catch (e) { toast('❌ ' + e.message, 'error'); }
  };

  window.submitQuote = async () => {
    const unit_price = parseFloat(document.getElementById('unit_price').value);
    const lead_time_days = parseInt(document.getElementById('lead_time_days').value);
    const note = document.getElementById('note').value.trim();

    if (!(unit_price > 0) || !(lead_time_days > 0)) {
      toast('❌ 请填写正确的单价和交期', 'error');
      return;
    }

    try {
      await App.api(`/api/processor/invitations/${id}/quote`, {
        method: 'POST',
        body: { unit_price, lead_time_days, note: note || null },
      });
      toast('✓ 报价已提交');
      setTimeout(load, 500);
    } catch (e) { toast('❌ ' + e.message, 'error'); }
  };

  load();
})();
</script>
</body>
</html>
