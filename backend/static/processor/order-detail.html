<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加工单详情 - MVP</title>
<link rel="stylesheet" href="/static/common.css">
<style>
  .timeline { margin-top:14px; }
  .timeline-item {
    padding:10px 14px; margin-bottom:8px; background:#0f172a;
    border-left:3px solid #60a5fa; border-radius:4px; font-size:13px;
  }
  .timeline-item.awarded   { border-color:#10b981; }
  .timeline-item.accepted  { border-color:#3b82f6; }
  .timeline-item.producing { border-color:#f59e0b; }
  .timeline-item.delivered { border-color:#10b981; }
  .photo-grid {
    display:grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr));
    gap:10px; margin-top:10px;
  }
  .photo-item {
    position:relative; aspect-ratio: 1 / 1; border-radius:8px; overflow:hidden;
    border:1px solid #334155; cursor:pointer;
  }
  .photo-item img { width:100%; height:100%; object-fit:cover; }
  .photo-item .remove-btn {
    position:absolute; top:4px; right:4px; width:22px; height:22px;
    background:rgba(127,29,29,.9); color:#fca5a5; border:none; border-radius:50%;
    cursor:pointer; font-size:12px; line-height:1;
  }
  .upload-tile {
    border:2px dashed #475569; border-radius:8px; aspect-ratio:1/1;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    color:#64748b; font-size:12px; transition: all .15s ease;
  }
  .upload-tile:hover { border-color:#60a5fa; color:#60a5fa; background:rgba(96,165,250,.05); }
  .photo-section {
    background:#0f172a; padding:14px; border-radius:8px; margin-top:14px;
    border-left:3px solid #60a5fa;
  }
  .photo-section h4 { font-size:13px; color:#e2e8f0; margin-bottom:6px; }
  .photo-section .req { font-size:11px; color:#fbbf24; margin-bottom:8px; }
  .photo-section.done { border-left-color:#10b981; }
  .compare-grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-top:14px; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <a href="/static/processor/home.html" style="color:inherit;">🏭 加工方首页</a>
    &nbsp;›&nbsp; <span style="color:#e2e8f0;">加工单详情</span>
  </div>
  <div class="user">
    <span class="badge processor">processor</span>
    <span id="user-name">—</span>
    <button class="logout" onclick="App.logout()">退出</button>
  </div>
</header>

<main>
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0; border:none; padding:0;">🛠 加工单 <span id="orderNo" style="color:#fbbf24;"></span></h2>
      <div class="row-actions">
        <span id="statusChip" class="badge"></span>
        <button class="primary" id="btnAccept"  onclick="go('accepted')"  style="display:none;">✅ 确认收料并接单</button>
        <button class="primary" id="btnProduce" onclick="go('producing')" style="display:none; background:#f59e0b;">🔨 开始加工</button>
        <button class="primary" id="btnDeliver" onclick="go('delivered')" style="display:none; background:#10b981;">🚚 提交交货</button>
      </div>
    </div>
    <div id="basic" style="margin-top:14px;">加载中...</div>
  </div>

  <!-- 物流取证板块：只有 awarded/accepted 及之后显示 -->
  <div class="card" id="logistics" style="display:none;">
    <h2>📸 物流取证（3 关）</h2>
    <div class="compare-grid">
      <!-- 材料方发货照 -->
      <div class="photo-section" id="sec1">
        <h4>关卡 1：材料方发货照</h4>
        <div class="muted" style="font-size:11px;">由材料方上传（只读）</div>
        <div class="photo-grid" id="grid_ship"></div>
      </div>
      <!-- 加工方收料照 -->
      <div class="photo-section" id="sec2">
        <h4>关卡 2：加工方收料照 <span class="req">*接单前必拍</span></h4>
        <div class="muted" style="font-size:11px;">收到物料时拍多张，做对比留证</div>
        <div class="photo-grid" id="grid_receive"></div>
      </div>
    </div>

    <!-- 完工照 -->
    <div class="photo-section" id="sec3" style="margin-top:14px;">
      <h4>关卡 3：成品照 <span class="req">*交货前必拍</span></h4>
      <div class="muted" style="font-size:11px;">加工完成后拍多张，证明成品质量</div>
      <div class="photo-grid" id="grid_complete"></div>
    </div>
  </div>

  <div class="card">
    <h2>🔧 零件清单</h2>
    <table style="margin-top:14px;">
      <thead><tr><th>零件号</th><th>名称</th><th>材质</th><th>数量</th><th>工序</th><th>规格</th></tr></thead>
      <tbody id="partsBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>📜 状态时间线</h2>
    <div class="timeline" id="timeline"></div>
  </div>
</main>

<!-- 全屏图片查看 -->
<div id="lightbox" style="position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center; z-index:500; cursor:pointer;"
     onclick="this.style.display='none'">
  <img id="lightbox-img" style="max-width:90%; max-height:90%; border-radius:8px;">
</div>

<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
<script>
(function () {
  const user = App.requireTenantType('processor');
  document.getElementById('user-name').textContent = user.display_name || user.username;

  const id = new URLSearchParams(location.search).get('id');
  if (!id) { alert('缺少 id'); location.href = '/static/processor/home.html'; return; }

  const STATUS_CN = {awarded:'已中标', accepted:'已接单', producing:'加工中', delivered:'已交货', cancelled:'已取消'};

  function toast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2500);
  }

  function viewImg(url) {
    document.getElementById('lightbox-img').src = url;
    document.getElementById('lightbox').style.display = 'flex';
  }
  window.viewImg = viewImg;

  async function load() {
    try {
      const data = await App.api('/api/processor/orders/' + id);
      const o = data.order;

      document.getElementById('orderNo').textContent = o.order_no;
      const chip = document.getElementById('statusChip');
      chip.className = 'badge ' + o.status;
      chip.textContent = STATUS_CN[o.status] || o.status;

      document.getElementById('basic').innerHTML = `
        <div><b>项目</b>: <code>${App.esc(o.project_no)}</code> ${App.esc(o.project_name || '')}</div>
        <div><b>询价标题</b>: ${App.esc(o.request_title)}</div>
        <div style="margin-top:10px;">
          <b>单价</b>: ¥${o.unit_price} &nbsp;|&nbsp;
          <b>数量</b>: ${o.quantity} &nbsp;|&nbsp;
          <b>总金额</b>: <span style="color:#fbbf24; font-weight:600;">¥${o.total_amount}</span>
        </div>
        <div><b>交期</b>: ${o.lead_time_days} 天 &nbsp;|&nbsp; <b>项目交期</b>: ${App.esc(o.project_deadline || '—')}</div>
      `;

      // 按钮显隐 (必须先上传照片才能推进状态)
      document.getElementById('btnAccept').style.display  = o.status === 'awarded'   ? 'inline-block' : 'none';
      document.getElementById('btnProduce').style.display = o.status === 'accepted'  ? 'inline-block' : 'none';
      document.getElementById('btnDeliver').style.display = o.status === 'producing' ? 'inline-block' : 'none';

      // 物流取证板块：非 cancelled 都显示
      if (o.status !== 'cancelled') {
        document.getElementById('logistics').style.display = '';
        renderPhotos('ship',     data.shipments_photos || [], null, false);
        renderPhotos('receive',  o.receive_photos || [],  'receive', o.status === 'awarded');
        renderPhotos('complete', o.complete_photos || [], 'complete', o.status === 'producing');
      }

      // 零件
      document.getElementById('partsBody').innerHTML = data.parts.map(p => `
        <tr>
          <td><code>${App.esc(p.part_no)}</code></td>
          <td>${App.esc(p.part_name || '—')}</td>
          <td>${App.esc(p.material || '—')}</td>
          <td>${p.qty}</td>
          <td>${(p.processes || []).map(x => '<span class="badge drafted" style="margin-right:4px;">'+App.esc(x)+'</span>').join('')}</td>
          <td>${App.esc(p.spec || '—')}</td>
        </tr>
      `).join('') || '<tr><td colspan="6" class="empty">无零件</td></tr>';

      // 时间线
      document.getElementById('timeline').innerHTML = data.events.map(e => `
        <div class="timeline-item ${e.to_status}">
          <div><b>${App.esc(STATUS_CN[e.to_status] || e.to_status)}</b>
            <span class="muted"> &larr; ${App.esc(STATUS_CN[e.from_status] || e.from_status || '—')}</span>
          </div>
          <div class="muted" style="font-size:11px; margin-top:4px;">
            ${App.fmtDate(e.occurred_at)} ${e.note ? '· ' + App.esc(e.note) : ''}
          </div>
        </div>
      `).join('') || '<div class="muted">无事件</div>';

    } catch (e) { toast('❌ ' + e.message, 'error'); }
  }

  /** 渲染 photo-grid
   * @param key 'ship' / 'receive' / 'complete'
   * @param photos 已有 path 数组
   * @param uploadable stage='receive'|'complete' 可上传；null 则只读
   * @param canUpload  是否在当前状态允许上传
   */
  function renderPhotos(key, photos, uploadable, canUpload) {
    const grid = document.getElementById('grid_' + key);
    if (!grid) return;
    const section = document.getElementById({ship:'sec1', receive:'sec2', complete:'sec3'}[key]);

    const items = photos.map(p => {
      const rm = uploadable && canUpload
        ? `<button class="remove-btn" onclick="event.stopPropagation(); rmPhoto('${uploadable}','${App.esc(p)}')">×</button>`
        : '';
      return `<div class="photo-item" onclick="viewImg('/uploads/${App.esc(p)}')">
        <img src="/uploads/${App.esc(p)}" alt="" loading="lazy">
        ${rm}
      </div>`;
    });
    if (uploadable && canUpload) {
      items.push(`<label class="upload-tile">
        + 添加照片
        <input type="file" accept="image/*" multiple
               style="display:none;"
               onchange="upPhotos('${uploadable}', this)">
      </label>`);
    }
    grid.innerHTML = items.join('') || '<div class="muted" style="font-size:12px;">暂无照片</div>';

    if (photos.length > 0) section.classList.add('done');
  }

  window.upPhotos = async (stage, input) => {
    const files = input.files;
    if (!files.length) return;
    for (const file of files) {
      try {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('stage', stage);
        await App.api(`/api/processor/orders/${id}/photos`, { method:'POST', body: fd });
      } catch (e) { toast('❌ ' + e.message, 'error'); }
    }
    input.value = '';
    toast('✓ 已上传 ' + files.length + ' 张');
    load();
  };

  window.rmPhoto = async (stage, path) => {
    if (!confirm('删除这张照片？')) return;
    try {
      await App.api(`/api/processor/orders/${id}/photos?stage=${stage}&path=${encodeURIComponent(path)}`,
                    { method:'DELETE' });
      toast('✓ 已删除');
      load();
    } catch (e) { toast('❌ ' + e.message, 'error'); }
  };

  window.go = async (to_status) => {
    const labels = {accepted:'确认收料并接单', producing:'开始加工', delivered:'提交交货'};
    if (!confirm(`确定要【${labels[to_status]}】吗？\n` +
                 (to_status==='accepted'?'系统会校验是否已上传收料照片':
                  to_status==='delivered'?'系统会校验是否已上传成品照片':''))) return;
    try {
      await App.api(`/api/processor/orders/${id}/status`, {
        method: 'POST',
        body: { to_status },
      });
      toast('✓ 状态已更新');
      load();
    } catch (e) { toast('❌ ' + e.message, 'error'); }
  };

  load();
})();
</script>
</body>
</html>
