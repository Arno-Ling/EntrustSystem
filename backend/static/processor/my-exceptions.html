<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>异常通知 - 加工方</title>
<link rel="stylesheet" href="/static/common.css">
<style>
.severity-critical { background:#7f1d1d; color:#fca5a5; padding:2px 8px; border-radius:4px; font-size:11px; }
.severity-high     { background:#7c2d12; color:#fdba74; padding:2px 8px; border-radius:4px; font-size:11px; }
.severity-medium   { background:#78350f; color:#fcd34d; padding:2px 8px; border-radius:4px; font-size:11px; }
.severity-low      { background:#0e7490; color:#67e8f9; padding:2px 8px; border-radius:4px; font-size:11px; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand"><a href="/static/processor/home.html" style="color:inherit;">🏭 加工方</a> &nbsp;›&nbsp; <span style="color:#e2e8f0;">异常通知</span></div>
  <div class="user">
    <span class="badge processor">processor</span>
    <span id="user-name">—</span>
    <button class="logout" onclick="App.logout()">退出</button>
  </div>
</header>

<main>
  <div class="card">
    <h2 style="margin-bottom:14px;">⚠️ 本厂被判责的异常</h2>
    <p class="muted" style="margin-bottom:14px;">我方质检异常时若判定本厂承担责任，相关 rework_orders 补料/重工单会推到此处</p>
    <table>
      <thead><tr>
        <th>异常号</th><th>项目</th><th>严重度</th><th>缺陷</th>
        <th>处理路径</th><th>我方承担</th><th>Rework 单</th><th>发生时间</th>
      </tr></thead>
      <tbody id="body"><tr><td colspan="8" class="empty">加载中...</td></tr></tbody>
    </table>
  </div>
</main>

<script src="/static/app.js"></script>
<script>
(function () {
  const user = App.requireTenantType('processor');
  document.getElementById('user-name').textContent = user.display_name || user.username;

  function toast(msg, type='success') {
    const t = document.getElementById('toast') || document.createElement('div');
    if (!t.id) { t.id='toast'; t.className='toast'; document.body.appendChild(t); }
    t.textContent = msg; t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2500);
  }

  async function load() {
    const r = await App.api('/api/processor/my-exceptions');
    const body = document.getElementById('body');
    if (!r.items.length) { body.innerHTML = `<tr><td colspan="9" class="empty">✓ 没有异常通知</td></tr>`; return; }
    body.innerHTML = r.items.map(e => {
      const rwHtml = (e.rework_orders || []).map(rw => {
        let actionBtn = '';
        if (rw.status === 'pending') {
          actionBtn = `<button class="primary" style="padding:3px 10px;font-size:11px;margin-left:6px;" onclick="confirmRework(${rw.id})">确认返工</button>`;
        } else if (rw.status === 'in_progress') {
          actionBtn = `<a href="/static/processor/rework-detail.html?id=${rw.id}" style="font-size:11px;margin-left:6px;">交货 →</a>`;
        } else if (rw.status === 'delivered' || rw.status === 'inspecting' || rw.status === 'completed') {
          actionBtn = `<a href="/static/processor/rework-detail.html?id=${rw.id}" style="font-size:11px;margin-left:6px;">查看</a>`;
        }
        return `<code style="font-size:10px;">${App.esc(rw.rework_no)}</code> <span class="badge ${rw.status}">${rw.status}</span>${actionBtn}`;
      }).join('<br>') || '—';
      return `<tr>
        <td><code>${App.esc(e.exception_no)}</code></td>
        <td>${App.esc(e.project_no)} · ${App.esc(e.project_name)}</td>
        <td><span class="severity-${e.severity}">${e.severity}</span></td>
        <td>${App.esc(e.exception_type || '—')}</td>
        <td><span class="badge">${App.esc(e.resolution_path || '—')}</span></td>
        <td><b style="color:#fbbf24;">${e.responsibility_ratio}%</b></td>
        <td>${rwHtml}</td>
        <td class="muted">${App.fmtDate(e.created_at)}</td>
      </tr>`;
    }).join('');
  }

  window.confirmRework = async (rwId) => {
    const remark = prompt('确认返工备注（可选）：');
    if (remark === null) return; // cancelled
    try {
      const r = await App.api(`/api/processor/rework-orders/${rwId}/confirm`, {
        method: 'POST',
        body: { remark: remark || null },
      });
      const branchMsg = r.branch === 'A' ? '（我方将安排补料）' : '（请自行采购材料并重新加工）';
      toast(`✓ 已确认返工${branchMsg}`);
      load();
    } catch (e) { toast('❌ ' + e.message, 'error'); }
  };

  load();
})();
</script>
<div class="toast" id="toast"></div>
</body>
</html>
