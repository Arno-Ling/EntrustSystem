<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>材质管理 - MVP</title>
<link rel="stylesheet" href="/static/common.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <a href="/static/internal/home.html" style="color:inherit;">🏢 模具委外采购系统</a>
    &nbsp;›&nbsp; <span style="color:#e2e8f0;">材质管理</span>
  </div>
  <div class="user">
    <span class="badge">internal</span>
    <span id="user-name">—</span>
    <button class="logout" onclick="App.logout()">退出</button>
  </div>
</header>

<main>
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
      <h2 style="margin:0; border:none; padding:0;">🧱 材质字典</h2>
      <button class="primary" onclick="openAdd()">+ 新增材质</button>
    </div>
    <table>
      <thead><tr>
        <th>编码</th><th>名称</th><th>分类</th><th>备注</th><th>状态</th><th>操作</th>
      </tr></thead>
      <tbody id="tbody"><tr><td colspan="6" class="empty">加载中...</td></tr></tbody>
    </table>
  </div>
</main>

<!-- Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modalTitle">新增材质</h3>
    <form onsubmit="return submitForm(event)">
      <input type="hidden" id="editId">
      <div class="flex">
        <div class="flex-grow"><label>编码 *</label><input id="f_code" required placeholder="Cr12MoV"></div>
        <div class="flex-grow"><label>名称 *</label><input id="f_name" required placeholder="Cr12MoV 冷作模具钢"></div>
      </div>
      <div class="flex">
        <div class="flex-grow">
          <label>分类</label>
          <select id="f_category">
            <option value="">未分类</option>
            <option value="cold_work">冷作模具钢</option>
            <option value="hot_work">热作模具钢</option>
            <option value="plastic_mold">塑胶模具钢</option>
            <option value="structural">结构钢</option>
          </select>
        </div>
        <div class="flex-grow"><label>备注</label><input id="f_remark" placeholder="可选"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="secondary" onclick="closeModal()">取消</button>
        <button type="submit" class="primary" id="btnSave">保存</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
<script>
(function () {
  const user = App.requireTenantType('internal');
  document.getElementById('user-name').textContent = user.display_name || user.username;

  function toast(msg, err=false) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + (err?'error':'success');
    setTimeout(() => t.className = 'toast', 2500);
  }

  const CAT_CN = { cold_work:'冷作', hot_work:'热作', plastic_mold:'塑胶', structural:'结构钢' };

  async function load() {
    const r = await App.api('/api/internal/admin/materials');
    const body = document.getElementById('tbody');
    if (!r.items.length) {
      body.innerHTML = '<tr><td colspan="6" class="empty">暂无材质</td></tr>';
      return;
    }
    body.innerHTML = r.items.map(m => `
      <tr>
        <td><code>${App.esc(m.code)}</code></td>
        <td>${App.esc(m.name)}</td>
        <td>${CAT_CN[m.category] || m.category || '—'}</td>
        <td class="muted">${App.esc(m.remark || '—')}</td>
        <td>${m.is_active ? '<span class="badge confirmed">启用</span>' : '<span class="badge cancelled">停用</span>'}</td>
        <td class="row-actions">
          <button class="secondary" onclick="openEdit(${m.id},'${App.esc(m.code)}','${App.esc(m.name)}','${m.category||''}','${App.esc(m.remark||'')}')">编辑</button>
          <button class="secondary" onclick="toggleActive(${m.id},${!m.is_active})">${m.is_active?'停用':'启用'}</button>
          <button class="secondary" style="color:#f87171;" onclick="del(${m.id},'${App.esc(m.code)}')">删除</button>
        </td>
      </tr>
    `).join('');
  }

  window.openAdd = () => {
    document.getElementById('modalTitle').textContent = '新增材质';
    document.getElementById('editId').value = '';
    document.getElementById('f_code').value = '';
    document.getElementById('f_name').value = '';
    document.getElementById('f_category').value = '';
    document.getElementById('f_remark').value = '';
    document.getElementById('modal').classList.add('show');
  };

  window.openEdit = (id, code, name, cat, remark) => {
    document.getElementById('modalTitle').textContent = '编辑材质';
    document.getElementById('editId').value = id;
    document.getElementById('f_code').value = code;
    document.getElementById('f_name').value = name;
    document.getElementById('f_category').value = cat;
    document.getElementById('f_remark').value = remark;
    document.getElementById('modal').classList.add('show');
  };

  window.closeModal = () => document.getElementById('modal').classList.remove('show');

  window.submitForm = async (ev) => {
    ev.preventDefault();
    const id = document.getElementById('editId').value;
    const body = {
      code: document.getElementById('f_code').value.trim(),
      name: document.getElementById('f_name').value.trim(),
      category: document.getElementById('f_category').value || null,
      remark: document.getElementById('f_remark').value.trim() || null,
    };
    try {
      if (id) {
        await App.api(`/api/internal/admin/materials/${id}`, { method:'PATCH', body });
        toast('✓ 已更新');
      } else {
        await App.api('/api/internal/admin/materials', { method:'POST', body });
        toast('✓ 已创建');
      }
      closeModal();
      load();
    } catch (e) { toast('❌ ' + e.message, true); }
    return false;
  };

  window.toggleActive = async (id, newVal) => {
    try {
      await App.api(`/api/internal/admin/materials/${id}`, { method:'PATCH', body:{is_active:newVal} });
      toast(newVal ? '✓ 已启用' : '✓ 已停用');
      load();
    } catch (e) { toast('❌ ' + e.message, true); }
  };

  window.del = async (id, code) => {
    if (!confirm(`确定删除材质 ${code}？`)) return;
    try {
      await App.api(`/api/internal/admin/materials/${id}`, { method:'DELETE' });
      toast('✓ 已删除');
      load();
    } catch (e) { toast('❌ ' + e.message, true); }
  };

  load();
})();
</script>
</body>
</html>
