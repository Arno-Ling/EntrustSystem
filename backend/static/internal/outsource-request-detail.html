<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>询价单详情 - MVP</title>
<link rel="stylesheet" href="/static/common.css">
<style>
  .stat-row { display:flex; gap:20px; margin-top:10px; }
  .stat-box { background:#0f172a; padding:10px 14px; border-radius:6px; min-width:110px; }
  .stat-box .num { font-size:22px; font-weight:600; }
  .stat-box .lbl { font-size:11px; color:#94a3b8; }
  .inv-status-sent { color:#fbbf24; }
  .inv-status-quoted { color:#6ee7b7; }
  .inv-status-no_response { color:#94a3b8; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <a href="/static/internal/outsource-requests.html" style="color:inherit;">🏢 委外询价单</a>
    &nbsp;›&nbsp; <span id="pTitle" style="color:#e2e8f0;">详情</span>
  </div>
  <div class="user">
    <a href="/static/internal/approvals.html" class="secondary" style="padding:6px 12px; border-radius:4px; font-size:12px;">📋 我的待办</a>
    <span class="badge">internal</span>
    <span id="user-name">—</span>
    <button class="logout" onclick="App.logout()">退出</button>
  </div>
</header>

<main>
  <!-- 基本信息 + 操作 -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">📨 询价单 <span id="reqId"></span></h2>
      <div class="row-actions">
        <span id="statusChip" class="badge"></span>
        <button class="primary" id="btnSend" onclick="doSend()" style="display:none;">📢 群发询价</button>
        <button class="primary" id="btnClose" onclick="doCloseQuoting()"
                style="display:none; background:#f59e0b;">🔒 截止报价 → 推送审批</button>
      </div>
    </div>
    <div style="margin-top:14px;" id="basic">加载中...</div>
    <div class="stat-row" id="stats" style="display:none;"></div>
  </div>

  <!-- 候选加工方（draft 状态） -->
  <div class="card" id="candidatesCard" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">🎯 候选加工方</h2>
      <div class="muted" style="font-size:12px;">按匹配工艺数降序（<b>不使用 AI</b>，固定算法）</div>
    </div>
    <table style="margin-top:14px;">
      <thead>
        <tr>
          <th>供应商</th>
          <th>主营</th>
          <th>匹配工艺</th>
          <th>覆盖度</th>
          <th>联系人</th>
          <th>电话</th>
        </tr>
      </thead>
      <tbody id="candBody"></tbody>
    </table>
  </div>

  <!-- 委外项（scope_items） — 5 层粒度 -->
  <div class="card" id="scopeCard" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">🎯 委外项（5 层粒度）</h2>
      <button class="primary" id="btnAddScope" onclick="openScopeModal()" style="display:none;">+ 添加委外项</button>
    </div>
    <table style="margin-top:14px;">
      <thead><tr>
        <th style="width:40px;">#</th>
        <th>粒度</th>
        <th>路径</th>
        <th>数量</th>
        <th>描述</th>
        <th>状态</th>
        <th style="width:60px;"></th>
      </tr></thead>
      <tbody id="scopeBody"><tr><td colspan="7" class="empty">—</td></tr></tbody>
    </table>
  </div>

  <!-- 邀请 + 报价看板（inviting / pending_award / awarded） -->
  <div class="card" id="invitationsCard" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">📬 邀请与报价看板</h2>
      <button class="secondary" onclick="load()">↻ 刷新</button>
    </div>
    <table style="margin-top:14px;">
      <thead>
        <tr>
          <th>供应商</th>
          <th>状态</th>
          <th>发送时间</th>
          <th>报价（元/件）</th>
          <th>交期（天）</th>
          <th>总金额</th>
          <th>提交时间</th>
          <th>备注</th>
        </tr>
      </thead>
      <tbody id="invBody"></tbody>
    </table>
  </div>
</main>

<div class="toast" id="toast"></div>

<!-- 添加委外项 modal -->
<div class="modal-bg" id="scopeModal">
  <div class="modal" style="max-width:620px;">
    <h3>+ 添加委外项</h3>
    <form onsubmit="return doAddScope(event)">
      <label>粒度</label>
      <select name="scope_level" onchange="onScopeLevelChange(this.value)">
        <option value="project">project — 整项目打包</option>
        <option value="mold">mold — 一套模具打包</option>
        <option value="part">part — 单个零件所有工序</option>
        <option value="method" selected>method — 某零件某道工序</option>
        <option value="face">face — 工序里的部分面</option>
      </select>
      <div id="scopeFields"></div>
      <label>数量</label>
      <input name="quantity" type="number" min="1" value="1">
      <label>描述</label>
      <input name="description" placeholder="例：die-01 的 P1 精铣 A,B 两面">
      <div class="modal-actions">
        <button type="button" class="secondary" onclick="closeScopeModal()">取消</button>
        <button type="submit" class="primary">添加</button>
      </div>
    </form>
  </div>
</div>

<script src="/static/app.js"></script>
<script>
(function () {
  const user = App.requireTenantType('internal');
  document.getElementById('user-name').textContent = user.display_name || user.username;

  const rid = new URLSearchParams(location.search).get('id');
  if (!rid) { alert('缺少 id'); location.href = '/static/internal/outsource-requests.html'; return; }

  function toast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2500);
  }

  async function load() {
    try {
      const data = await App.api('/api/internal/outsource-requests/' + rid);
      const r = data.request;

      document.getElementById('pTitle').textContent = r.title;
      document.getElementById('reqId').textContent = '#' + r.id;

      const chip = document.getElementById('statusChip');
      chip.className = 'badge ' + r.status;
      chip.textContent = r.status;

      // 基本信息
      document.getElementById('basic').innerHTML = `
        <div>
          <b>项目</b>: <code>${App.esc(r.project_no)}</code> ${App.esc(r.project_name || '')}
          &nbsp;|&nbsp; <b>数量</b>: ${r.quantity || '—'}
          &nbsp;|&nbsp; <b>交期</b>: ${App.esc(r.deadline || '—')}
        </div>
        <div style="margin-top:6px;">
          <b>所需工艺</b>:
          ${(r.required_processes || []).map(p => '<span class="badge drafted" style="margin-right:4px;">'+App.esc(p)+'</span>').join('')}
        </div>
      `;

      // Stats
      const s = data.stats;
      const statsEl = document.getElementById('stats');
      statsEl.style.display = r.status !== 'draft' ? 'flex' : 'none';
      statsEl.innerHTML = `
        <div class="stat-box"><div class="num">${s.total_invited}</div><div class="lbl">已邀请</div></div>
        <div class="stat-box"><div class="num inv-status-quoted">${s.quoted}</div><div class="lbl">已报价</div></div>
        <div class="stat-box"><div class="num inv-status-sent">${s.pending}</div><div class="lbl">待回复</div></div>
        <div class="stat-box"><div class="num inv-status-no_response">${s.no_response}</div><div class="lbl">已过期</div></div>
      `;

      // Buttons
      document.getElementById('btnSend').style.display  = r.status === 'draft' ? 'inline-block' : 'none';
      document.getElementById('btnClose').style.display = (r.status === 'inviting' && s.quoted > 0) ? 'inline-block' : 'none';

      // Candidates (仅 draft 状态显示)
      document.getElementById('candidatesCard').style.display = r.status === 'draft' ? 'block' : 'none';
      document.getElementById('scopeCard').style.display = ['draft','inviting','pending_award'].includes(r.status) ? 'block' : 'none';
      document.getElementById('btnAddScope').style.display = r.status === 'draft' ? 'inline-block' : 'none';
      // Load scope items
      if (document.getElementById('scopeCard').style.display === 'block') {
        await loadScopeItems(r.status === 'draft');
      }

      if (r.status === 'draft') {
        const cand = await App.api(`/api/internal/outsource-requests/${rid}/candidates`);
        const cbody = document.getElementById('candBody');
        if (!cand.items.length) {
          cbody.innerHTML = `<tr><td colspan="6" class="empty">⚠️ 没有符合工艺要求的候选加工方</td></tr>`;
        } else {
          cbody.innerHTML = cand.items.map(c => `
            <tr>
              <td><b>${App.esc(c.name)}</b></td>
              <td><span class="muted">${App.esc(c.category || '—')}</span></td>
              <td>${(c.matched_processes || []).map(p => '<span class="badge drafted" style="margin-right:4px;">'+App.esc(p)+'</span>').join('')}</td>
              <td><code>${c.coverage}</code></td>
              <td>${App.esc(c.contact_name || '—')}</td>
              <td class="muted">${App.esc(c.contact_phone || '—')}</td>
            </tr>
          `).join('');
        }
      }

      // Invitations (non-draft 状态显示)
      document.getElementById('invitationsCard').style.display = r.status !== 'draft' ? 'block' : 'none';
      if (r.status !== 'draft') {
        const invBody = document.getElementById('invBody');
        if (!data.invitations.length) {
          invBody.innerHTML = `<tr><td colspan="8" class="empty">没有邀请</td></tr>`;
        } else {
          invBody.innerHTML = data.invitations.map(i => {
            const total = (i.unit_price && r.quantity) ? (i.unit_price * r.quantity).toFixed(2) : '—';
            return `
              <tr>
                <td>${App.esc(i.supplier_name)}</td>
                <td><span class="inv-status-${i.invitation_status}">
                  ${App.esc({sent:'待回复',quoted:'已报价',no_response:'未响应',cancelled:'已取消'}[i.invitation_status] || i.invitation_status)}
                </span></td>
                <td class="muted">${App.fmtDate(i.sent_at)}</td>
                <td>${i.unit_price != null ? '¥' + i.unit_price : '—'}</td>
                <td>${i.lead_time_days || '—'}</td>
                <td>${total === '—' ? '—' : '¥' + total}</td>
                <td class="muted">${i.submitted_at ? App.fmtDate(i.submitted_at) : '—'}</td>
                <td class="muted" style="max-width:200px;">${App.esc(i.note || '')}</td>
              </tr>
            `;
          }).join('');
        }
      }
    } catch (e) {
      toast('❌ ' + e.message, 'error');
    }
  }
  window.load = load;

  // ---------- Scope Items ----------
  async function loadScopeItems(draft) {
    const r = await App.api(`/api/internal/outsource-requests/${rid}/scope-items`);
    const body = document.getElementById('scopeBody');
    if (!r.items.length) {
      body.innerHTML = `<tr><td colspan="7" class="empty">${draft ? '点【+ 添加委外项】按粒度拆分' : '此询价单没有委外项（旧版整单询价）'}</td></tr>`;
      return;
    }
    body.innerHTML = r.items.map((it, i) => `
      <tr>
        <td>${i+1}</td>
        <td><span class="badge ${it.scope_level === 'face' ? 'deciding' : 'drafted'}">${App.esc(it.scope_level)}</span></td>
        <td><code style="font-size:11px;">${App.esc(it.display_path)}</code></td>
        <td>${it.quantity}</td>
        <td class="muted" style="max-width:260px;">${App.esc(it.description || '—')}</td>
        <td><span class="badge ${it.status}">${it.status}</span></td>
        <td>${draft ? `<button class="danger" onclick="delScope(${it.scope_item_id})">×</button>` : ''}</td>
      </tr>`).join('');
  }

  // 项目+模具+零件+工序 缓存 (画 scope modal 用)
  let _projectData = null;
  async function ensureProjectData() {
    if (_projectData) return _projectData;
    const req = await App.api('/api/internal/outsource-requests/' + rid);
    const pid = req.request.project_id;
    _projectData = await App.api('/api/internal/projects/' + pid);
    return _projectData;
  }

  window.openScopeModal = async () => {
    document.getElementById('scopeModal').classList.add('show');
    onScopeLevelChange('method');
  };
  window.closeScopeModal = () => document.getElementById('scopeModal').classList.remove('show');

  window.onScopeLevelChange = async (level) => {
    const d = await ensureProjectData();
    const container = document.getElementById('scopeFields');

    const moldOpts = '<option value="">（不限，项目级）</option>' +
      (d.molds || []).map(m => `<option value="${m.id}">${App.esc(m.mold_no)}</option>`).join('');
    const partOpts = (d.parts || []).map(p =>
      `<option value="${p.id}" data-mold="${p.mold_id || ''}">${App.esc(p.part_no)} (${App.esc(p.part_type || '?')})</option>`
    ).join('');

    let html = '';
    if (level === 'mold') {
      html = `<label>模具 *</label><select name="mold_id" required><option value="">选择</option>${
        (d.molds || []).map(m => `<option value="${m.id}">${App.esc(m.mold_no)}</option>`).join('')
      }</select>`;
    } else if (level === 'part') {
      html = `<label>零件 *</label><select name="part_id" required><option value="">选择</option>${partOpts}</select>`;
    } else if (level === 'method' || level === 'face') {
      html = `<label>零件 *</label><select name="part_id" id="partSel" required onchange="onScopePartChange(this.value)"><option value="">选择</option>${partOpts}</select>
              <label>工序 *</label><select name="process_id" id="procSel" required><option value="">先选零件</option></select>`;
      if (level === 'face') {
        html += `<label>面（多选 A-F）*</label><div id="faceBox" style="display:flex; gap:10px; padding:8px 0;">
                  <span class="muted">先选工序</span>
                </div>`;
      }
    }
    container.innerHTML = html;
  };

  window.onScopePartChange = async (part_id) => {
    if (!part_id) return;
    const d = await ensureProjectData();
    const part = (d.parts || []).find(p => String(p.id) === String(part_id));
    const sel = document.getElementById('procSel');
    sel.innerHTML = (part && part.process_list && part.process_list.length)
      ? part.process_list.map(pr => `<option value="${pr.id}">${App.esc(pr.process_code)} · ${App.esc(pr.method_name)}</option>`).join('')
      : '<option value="">（无工序）</option>';
    // 触发 face 的 faces 加载
    if (document.getElementById('faceBox')) {
      sel.onchange = () => onScopeProcChange(sel.value);
      onScopeProcChange(sel.value);
    }
  };

  window.onScopeProcChange = async (process_id) => {
    const box = document.getElementById('faceBox');
    if (!box) return;
    if (!process_id) { box.innerHTML = '<span class="muted">先选工序</span>'; return; }
    // 前端不直接查 process_faces (没有专门接口)，让用户手动填
    box.innerHTML = ['A','B','C','D','E','F'].map(f =>
      `<label><input type="checkbox" name="face_labels" value="${f}"> ${f}</label>`
    ).join('');
    box.setAttribute('data-process-id', process_id);
  };

  window.doAddScope = async (ev) => {
    ev.preventDefault();
    const fd = new FormData(ev.target);
    const body = {
      scope_level: fd.get('scope_level'),
      quantity: parseInt(fd.get('quantity')) || 1,
      description: fd.get('description') || null,
    };
    ['mold_id','part_id','process_id'].forEach(k => {
      const v = fd.get(k);
      if (v) body[k] = parseInt(v);
    });

    // face 级要先确保 process_faces 存在，然后填 face_ids
    if (body.scope_level === 'face') {
      const labels = fd.getAll('face_labels');
      if (!labels.length) { toast('❌ face 级要勾至少一个面', 'error'); return false; }
      // 先确保 process_faces 都存在（后端 process_faces 表，让它按 label 先插再查）
      // MVP: 先不做自动插，提示用户去后端手动建；或简单起见，直接报错说 face_ids 需要后端 process_faces 有记录
      try {
        // 尝试通过一个简单查询获取 face_ids
        // 由于没有端点，用 App.api('/api/internal/process-faces?process_id=xx&labels=A,B')
        const process_id = parseInt(fd.get('process_id'));
        const res = await App.api(`/api/internal/processes/${process_id}/faces?labels=` + labels.join(','));
        body.face_ids = res.ids;
      } catch (e) {
        toast('❌ ' + e.message, 'error');
        return false;
      }
    }

    try {
      await App.api(`/api/internal/outsource-requests/${rid}/scope-items`, { method:'POST', body });
      toast('✓ 委外项已添加');
      closeScopeModal();
      await loadScopeItems(true);
    } catch (e) { toast('❌ ' + e.message, 'error'); }
    return false;
  };

  window.delScope = async (id) => {
    if (!confirm('删除这个委外项？')) return;
    try {
      await App.api(`/api/internal/scope-items/${id}`, { method:'DELETE' });
      toast('✓ 已删除');
      await loadScopeItems(true);
    } catch (e) { toast('❌ ' + e.message, 'error'); }
  };

  window.doSend = async () => {
    if (!confirm('将群发询价给所有符合工艺的加工方，确定？')) return;
    try {
      const r = await App.api(`/api/internal/outsource-requests/${rid}/send`, { method: 'POST' });
      toast(`✓ 已发送给 ${r.invited_count} 家加工方`);
      load();
    } catch (e) { toast('❌ ' + e.message, 'error'); }
  };

  window.doCloseQuoting = async () => {
    if (!confirm('截止报价后不再接受新报价，会把所有已回复的报价推送采购经理审批。确定？')) return;
    try {
      const r = await App.api(`/api/internal/outsource-requests/${rid}/close-quoting`, { method: 'POST' });
      toast(`✓ 已截止，审批任务 #${r.task_id} 已创建`);
      load();
    } catch (e) { toast('❌ ' + e.message, 'error'); }
  };

  load();
})();
</script>
</body>
</html>
